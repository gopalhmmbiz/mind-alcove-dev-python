version: "3.9"

services:
  mindalcove-fastapi:
    container_name: mindalcove-fastapi-container
    build:
      context: .
      dockerfile: Dockerfile
    image: mindalcove-backend-fastapi-app:latest
    ports:
      - "8000:8000"
    restart: unless-stopped

    # Load environment variables
    env_file:
      - .env

    # Optional (REMOVE in production)
    volumes:
      - .:/app

    # Healthcheck for reliability
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

    # Logging control (important for server)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
