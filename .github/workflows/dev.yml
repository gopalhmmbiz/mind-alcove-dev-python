name: Deploy Python API to Dev

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/python-api

            # Pull latest code
            git pull origin dev

            # Rebuild and restart container
            docker compose -f /var/www/python-api/docker-compose.yml down
            docker compose -f /var/www/python-api/docker-compose.yml build --no-cache
            docker compose -f /var/www/python-api/docker-compose.yml up -d

            echo "✅ Python API deployed successfully"